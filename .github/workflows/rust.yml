name: Rust

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: ✅ Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install Linux system dependencies
        run: |
          for attempt in 1 2 3; do
            sudo apt-get update -o Acquire::Retries=3 && \
            sudo apt-get install -y -o Acquire::Retries=3 pkg-config libasound2-dev libudev-dev && break
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install system dependencies after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Retrying apt dependency installation..."
            sleep 15
          done
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo check
        run: cargo check --all

  lint:
    name: 🚨 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install Linux system dependencies
        run: |
          for attempt in 1 2 3; do
            sudo apt-get update -o Acquire::Retries=3 && \
            sudo apt-get install -y -o Acquire::Retries=3 pkg-config libasound2-dev libudev-dev && break
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install system dependencies after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Retrying apt dependency installation..."
            sleep 15
          done
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo fmt
        run: cargo fmt --all -- --check
      - name: Run cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -A clippy::multiple-crate-versions

  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install Linux system dependencies
        run: |
          for attempt in 1 2 3; do
            sudo apt-get update -o Acquire::Retries=3 && \
            sudo apt-get install -y -o Acquire::Retries=3 pkg-config libasound2-dev libudev-dev && break
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to install system dependencies after ${attempt} attempts." >&2
              exit 1
            fi
            echo "Retrying apt dependency installation..."
            sleep 15
          done
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo test
        run: cargo test --all

  unused_dependencies:
    name: 📦 Unused Crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Install cargo-udeps
        uses: taiki-e/install-action@cargo-udeps
      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run cargo udeps
        run: cargo +nightly udeps --all-targets

  security_audit:
    name: 👮 Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Audit Rust dependencies
        uses: actions-rust-lang/audit@v1
